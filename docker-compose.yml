services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deaa_hub
      POSTGRES_USER: deaa
      POSTGRES_PASSWORD: deaa_dev_password
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deaa -d deaa_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: deaa_minio
      MINIO_ROOT_PASSWORD: deaa_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://deaa:deaa_dev_password@postgres:5432/deaa_hub?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-this-docker-secret
      JWT_EXPIRES_IN: 1d
      FRONTEND_URL: http://localhost:3000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: deaa_minio
      MINIO_SECRET_KEY: deaa_minio_password
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_ORIGINAL_DOCUMENTS: deaa-original-documents
      MINIO_BUCKET_SIGNED_DOCUMENTS: deaa-signed-documents
      MINIO_BUCKET_SIGNATURE_ASSETS: deaa-signature-assets
      MINIO_BUCKET_PROFILE_IMAGES: deaa-profile-images
      MINIO_BUCKET_TEMP: deaa-temp
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health/infrastructure').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:4000/api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:4000/api
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  minio-data:
